body {
  margin: 0;

  background: #0f172a;
  color: #fff;
}

header {
  background: #020617;
  padding: 15px;
  position: sticky;
  top: 0;
  z-index: 999;
}

nav {
  display: flex;
  justify-content: space-between;
}

nav a {
  color: #fff;
  text-decoration: none;
  margin: 0 10px;
}

.container {
  padding: 20px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.card h3 {
  margin: 10px 0 5px;
}

.card button {
  background: #22c55e;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
  cursor: pointer;
  color: #000;
}

.form-popup {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #020617;
  padding: 20px;
  display: none;
}

input, textarea, select {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 5px;
  border: none;
}

footer {
  text-align: center;
  padding: 20px;
}
</style>

function openForm(name){
  selectedProduct = name;
  document.getElementById("formOrder").style.display = "block";
}

function sendOrder(){
  let email = document.getElementById("email").value;
  let wa = document.getElementById("wa").value;
  let device = document.getElementById("device").value;

  let text = `ORDER%0AProduk: ${selectedProduct}%0AEmail: ${email}%0AWA: ${wa}%0ADevice: ${device}%0ACatatan: ${note}`;

}
