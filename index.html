<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEIZO SHOP</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: #fff;
}

header {
  background: #111;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 18px;
}

nav a {
  color: #aaa;
  margin-left: 15px;
  text-decoration: none;
}

.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h2 {
  font-size: 28px;
}

.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 12px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.price {
  color: #00ff88;
  margin: 8px 0;
}

button {
  background: #00ff88;
  border: none;
  padding: 8px;
  width: 100%;
  border-radius: 6px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
  color: #888;
}
</style>
</head>

<body>

<header>
  <h1>KEIZO SHOP</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#produk">Produk</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero" id="home">
  <h2>APPS PREMIUM TERMURAH</h2>
  <p>Fast • Aman • Trusted</p>
</section>

<section class="container" id="produk">
  <h2>LIST PRODUK</h2>
  <div class="grid" id="list"></div>
</section>

<section class="container" id="about">
  <h2>Tentang Kami</h2>
  <p>KEIZO SHOP menyediakan aplikasi premium murah, cepat, dan terpercaya.</p>
</section>

<section class="container" id="contact">
  <h2>Contact</h2>
  <p>WhatsApp: 6285657279971</p>
</section>

<footer>
  © 2026 KEIZO SHOP
</footer>

<script>
let nomor = "6285657279971"

let produk = [
["Netflix 1B 1U","Rp 20.000"],
["Spotify 1B Fullgar","Rp 21.200"],
["YouTube 1B Famplan","Rp 4.000"],
["ChatGPT 1B Shar","Rp 8.200"],
["Capcut 7D","Rp 4.000"],
["Vidio 1B","Rp 16.000"],
["Disney+ 7D","Rp 13.000"],
["Loklok 1B","Rp 19.000"]
]

let list = document.getElementById("list")

produk.forEach(p => {
  let div = document.createElement("div")
  div.className = "card"
  div.innerHTML = `
    <h3>${p[0]}</h3>
    <div class="price">${p[1]}</div>
    <button onclick="beli('${p[0]}')">Beli</button>
  `
  list.appendChild(div)
})

function beli(nama){
  let text = `Halo kak, saya mau beli ${nama}`
  let url = `https://wa.me/${nomor}?text=${encodeURIComponent(text)}`
  window.open(url)
}
</script>

</body>
</html>
